# Nginx reverse proxy configuration for MCP Apps
# Place this in /etc/nginx/sites-available/mcp-apps
# Enable with: sudo ln -s /etc/nginx/sites-available/mcp-apps /etc/nginx/sites-enabled/mcp-apps
# Test with: sudo nginx -t
# Reload with: sudo systemctl reload nginx

upstream crypto_portfolio_mcp {
  server localhost:3000;
}

upstream crypto_tax_mcp {
  server localhost:3001;
}

server {
  listen 80;
  listen [::]:80;
  server_name _;

  # Redirect all HTTP to HTTPS
  location / {
    return 301 https://$host$request_uri;
  }

  # Allow Let's Encrypt ACME challenge
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name _;

  # SSL certificates (set up with Let's Encrypt certbot)
  ssl_certificate /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;

  # SSL configuration
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # Logging
  access_log /var/log/nginx/mcp-apps-access.log combined;
  error_log /var/log/nginx/mcp-apps-error.log warn;

  # Security headers
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;

  # Crypto Portfolio MCP (Phase 1)
  location /portfolio/ {
    proxy_pass http://crypto_portfolio_mcp/;
    proxy_http_version 1.1;

    # Headers required for Streamable HTTP
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Forward Authorization header
    proxy_pass_request_headers on;

    # Streaming support
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_set_header Transfer-Encoding "";
    proxy_set_header Content-Length "";

    # Timeouts
    proxy_connect_timeout 30s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
  }

  # Crypto Tax MCP (Phase 2)
  location /tax/ {
    proxy_pass http://crypto_tax_mcp/;
    proxy_http_version 1.1;

    # Headers required for Streamable HTTP
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Forward Authorization header
    proxy_pass_request_headers on;

    # Streaming support
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_set_header Transfer-Encoding "";
    proxy_set_header Content-Length "";

    # Timeouts
    proxy_connect_timeout 30s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
  }

  # Health check endpoint (both services)
  location /health {
    location ~ ^/health/?$ {
      proxy_pass http://crypto_portfolio_mcp/health;
      access_log off;
    }
  }

  # Deny direct access to sensitive paths
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }
}
